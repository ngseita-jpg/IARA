<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iara</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: #08080f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden;
  }

  /* ── iPhone 15 Pro body ── */
  .iphone {
    position: relative;
    width: 290px;
    height: 628px;
    border-radius: 52px;
    background:
      linear-gradient(160deg,
        #4a4a5c 0%,
        #2a2a38 25%,
        #1e1e2c 50%,
        #252535 75%,
        #3a3a4a 100%);
    box-shadow:
      /* borda externa brilhante */
      0 0 0 1px rgba(255,255,255,0.15),
      /* borda externa escura */
      0 0 0 2.5px rgba(0,0,0,0.9),
      /* inset highlight topo */
      inset 0 2px 0 rgba(255,255,255,0.18),
      /* inset shadow base */
      inset 0 -2px 0 rgba(0,0,0,0.55),
      /* sombra drop */
      0 50px 120px rgba(0,0,0,0.85),
      0 15px 40px rgba(0,0,0,0.6),
      /* brilho roxo ambiente */
      0 0 80px rgba(124,92,252,0.15);
  }

  /* ── Botões laterais ── */
  .btn {
    position: absolute;
    border-radius: 2px 0 0 2px;
    background: linear-gradient(to right, #181828, #282840);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.1),
      inset 0 -1px 0 rgba(0,0,0,0.3);
  }
  .btn-right {
    border-radius: 0 2px 2px 0;
    background: linear-gradient(to left, #181828, #282840);
  }

  /* silencioso */
  .btn-mute  { left: -3.5px; top: 108px; width: 3.5px; height: 28px; }
  /* volume + */
  .btn-vup   { left: -3.5px; top: 154px; width: 3.5px; height: 52px; }
  /* volume - */
  .btn-vdown { left: -3.5px; top: 216px; width: 3.5px; height: 52px; }
  /* power */
  .btn-power { right: -3.5px; top: 165px; width: 3.5px; height: 74px; }

  /* ── Tela ── */
  .screen {
    position: absolute;
    top: 5px; left: 5px; right: 5px; bottom: 5px;
    border-radius: 47px;
    overflow: hidden;
    background: #000;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.8);
  }

  /* reflexo vidro */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 47px;
    background: linear-gradient(
      128deg,
      rgba(255,255,255,0.07) 0%,
      rgba(255,255,255,0.02) 35%,
      transparent 60%
    );
    z-index: 100;
    pointer-events: none;
  }

  /* ── Status bar ── */
  .statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 22px 8px;
    z-index: 50;
    pointer-events: none;
  }

  .statusbar .time {
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  .statusbar .icons {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ── Dynamic Island ── */
  .island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 104px;
    height: 30px;
    border-radius: 20px;
    background: #000;
    box-shadow: 0 0 0 1.5px rgba(255,255,255,0.06);
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .island .cam {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    box-shadow: inset 0 0 3px rgba(80,160,255,0.3), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .island .sensor {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #181818;
    border: 1px solid #222;
  }

  /* ── iframe ── */
  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #0a0a14;
  }

  /* ── Home indicator ── */
  .home-bar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 96px; height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.22);
    z-index: 50;
    pointer-events: none;
  }

  /* ── Reflexo no corpo ── */
  .iphone::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    border-radius: 52px 52px 20px 20px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
    pointer-events: none;
  }

  /* ── Loading spinner ── */
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a14;
    z-index: 10;
  }

  .spinner {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(124,92,252,0.25);
    border-top-color: #7c5cfc;
    animation: spin 0.75s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* bateria */
  .battery {
    display: flex;
    align-items: center;
  }
  .battery-body {
    position: relative;
    width: 22px; height: 11px;
    border-radius: 3.5px;
    border: 1.5px solid rgba(255,255,255,0.4);
  }
  .battery-fill {
    position: absolute;
    left: 2px; top: 2px; bottom: 2px;
    width: 62%;
    background: white;
    border-radius: 1.5px;
  }
  .battery-nub {
    width: 2px; height: 5px;
    margin-left: 1px;
    border-radius: 0 1px 1px 0;
    background: rgba(255,255,255,0.32);
  }
</style>
</head>
<body>

<div class="iphone">
  <!-- botões -->
  <div class="btn btn-mute"></div>
  <div class="btn btn-vup"></div>
  <div class="btn btn-vdown"></div>
  <div class="btn btn-right btn-power"></div>

  <!-- tela -->
  <div class="screen">
    <!-- dynamic island -->
    <div class="island">
      <div class="cam"></div>
      <div class="sensor"></div>
    </div>

    <!-- status bar -->
    <div class="statusbar">
      <span class="time" id="clock">--:--</span>
      <div class="icons">
        <!-- sinal -->
        <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
          <rect x="0" y="8" width="2.5" height="3" rx="0.6" fill="white" opacity="0.28"/>
          <rect x="3.5" y="5.5" width="2.5" height="5.5" rx="0.6" fill="white" opacity="0.5"/>
          <rect x="7" y="3" width="2.5" height="8" rx="0.6" fill="white" opacity="0.75"/>
          <rect x="10.5" y="0" width="2.5" height="11" rx="0.6" fill="white"/>
        </svg>
        <!-- wifi -->
        <svg width="14" height="11" viewBox="0 0 20 14" fill="none">
          <circle cx="10" cy="13" r="1.8" fill="white"/>
          <path d="M5.5 8.5C6.9 7.1 8.4 6.3 10 6.3s3.1.8 4.5 2.2l1.5-1.5C14.2 5.1 12.2 4 10 4S5.8 5.1 4 7l1.5 1.5z" fill="white" opacity="0.6"/>
          <path d="M1.5 5C3.6 2.9 6.6 1.5 10 1.5S16.4 2.9 18.5 5L20 3.5C17.5 1.3 13.9 0 10 0S2.5 1.3 0 3.5L1.5 5z" fill="white" opacity="0.28"/>
        </svg>
        <!-- bateria -->
        <div class="battery">
          <div class="battery-body"><div class="battery-fill"></div></div>
          <div class="battery-nub"></div>
        </div>
      </div>
    </div>

    <!-- loading -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <!-- app iframe -->
    <iframe id="app" style="display:none" title="Iara"></iframe>

    <!-- home indicator -->
    <div class="home-bar"></div>
  </div>
</div>

<script>
  // relógio
  function tick() {
    const now = new Date()
    const h = String(now.getHours()).padStart(2,'0')
    const m = String(now.getMinutes()).padStart(2,'0')
    document.getElementById('clock').textContent = h + ':' + m
  }
  tick()
  setInterval(tick, 30000)

  // ativa demo e carrega o app
  const BASE = 'http://localhost:3001'

  fetch(BASE + '/api/preview-mode?ativar=true', { credentials: 'include' })
    .then(() => {
      const iframe = document.getElementById('app')
      iframe.src = BASE + '/dashboard/roteiros'
      iframe.style.display = 'block'
      iframe.onload = () => {
        document.getElementById('loader').style.display = 'none'
      }
    })
    .catch(() => {
      document.getElementById('loader').innerHTML =
        '<p style="color:#5a5a7a;font-size:12px;text-align:center">servidor offline<br><span style="font-size:10px">rode npm run dev</span></p>'
    })
</script>
</body>
</html>
